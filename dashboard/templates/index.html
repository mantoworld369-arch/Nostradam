<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOSTRADAM</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Outfit:wght@300;600;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #c8c8d4;
    --text-dim: #6b6b80;
    --accent: #00e5a0;
    --accent-dim: #00e5a033;
    --red: #ff4d6a;
    --red-dim: #ff4d6a22;
    --yellow: #ffc23a;
    --blue: #4da6ff;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
  }

  .header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .logo span { color: var(--text-dim); font-weight: 300; font-size: 11px; letter-spacing: 1px; margin-left: 12px; }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
    display: inline-block;
    margin-right: 8px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1px;
    background: var(--border);
    margin: 24px 32px;
    border: 1px solid var(--border);
  }

  .card {
    background: var(--surface);
    padding: 20px 24px;
  }

  .card-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .card-value {
    font-size: 28px;
    font-weight: 700;
    font-family: 'Outfit', sans-serif;
  }

  .card-value.green { color: var(--accent); }
  .card-value.red { color: var(--red); }
  .card-value.neutral { color: var(--text); }

  .section {
    margin: 24px 32px;
  }

  .section-title {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  th {
    text-align: left;
    padding: 8px 12px;
    font-weight: 400;
    color: var(--text-dim);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 10px 12px;
    border-bottom: 1px solid #1a1a24;
  }

  tr:hover td { background: #1a1a24; }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .tag-yes { background: var(--accent-dim); color: var(--accent); }
  .tag-no { background: var(--red-dim); color: var(--red); }
  .tag-win { background: var(--accent-dim); color: var(--accent); }
  .tag-loss { background: var(--red-dim); color: var(--red); }
  .tag-open { background: #ffc23a22; color: var(--yellow); }

  .tag-signal {
    background: #4da6ff18;
    color: var(--blue);
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .empty-state p { margin-top: 8px; font-size: 11px; }

  .footer {
    text-align: center;
    padding: 32px;
    color: var(--text-dim);
    font-size: 10px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">NOSTRADAM <span>Phase 1 — Paper Trading</span></div>
  <div style="color: var(--text-dim); font-size: 11px;">
    <span class="status-dot"></span>
    <span id="status">Connecting...</span>
  </div>
</div>

<div class="grid" id="stats-grid">
  <div class="card">
    <div class="card-label">Bankroll</div>
    <div class="card-value neutral" id="bankroll">$—</div>
  </div>
  <div class="card">
    <div class="card-label">Total P&L</div>
    <div class="card-value neutral" id="pnl">$—</div>
  </div>
  <div class="card">
    <div class="card-label">Win Rate</div>
    <div class="card-value neutral" id="winrate">—%</div>
  </div>
  <div class="card">
    <div class="card-label">Trades</div>
    <div class="card-value neutral" id="trades-count">—</div>
  </div>
  <div class="card">
    <div class="card-label">Avg Edge</div>
    <div class="card-value neutral" id="avg-edge">—%</div>
  </div>
  <div class="card">
    <div class="card-label">Drawdown</div>
    <div class="card-value neutral" id="drawdown">—%</div>
  </div>
  <div class="card">
    <div class="card-label">Open Positions</div>
    <div class="card-value neutral" id="open-pos">—</div>
  </div>
  <div class="card">
    <div class="card-label">Daily P&L</div>
    <div class="card-value neutral" id="daily-pnl">$—</div>
  </div>
</div>

<div class="section">
  <div class="section-title">Recent Trades</div>
  <div id="trades-table">
    <div class="empty-state">
      <div style="font-size: 24px; margin-bottom: 8px;">⏳</div>
      <p>Waiting for first trade...</p>
    </div>
  </div>
</div>

<div class="footer">NOSTRADAM v0.1 — PAPER MODE — Auto-refreshes every 10s</div>

<script>
  function fmt(n, prefix='') {
    if (n === null || n === undefined) return '—';
    return prefix + Number(n).toFixed(2);
  }

  function colorClass(val) {
    if (val > 0) return 'green';
    if (val < 0) return 'red';
    return 'neutral';
  }

  async function refresh() {
    try {
      const [stateRes, tradesRes] = await Promise.all([
        fetch('/api/state'),
        fetch('/api/trades')
      ]);
      const state = await stateRes.json();
      const trades = await tradesRes.json();

      const t = state.trader;
      const p = state.performance;

      document.getElementById('status').textContent = 'Live — Paper Mode';
      document.getElementById('bankroll').textContent = fmt(t.bankroll, '$');
      document.getElementById('bankroll').className = 'card-value ' + colorClass(t.bankroll - 100);

      document.getElementById('pnl').textContent = fmt(p.total_pnl, '$');
      document.getElementById('pnl').className = 'card-value ' + colorClass(p.total_pnl);

      document.getElementById('winrate').textContent = p.win_rate + '%';
      document.getElementById('winrate').className = 'card-value ' + (p.win_rate >= 55 ? 'green' : p.win_rate < 45 ? 'red' : 'neutral');

      document.getElementById('trades-count').textContent = p.total_trades;
      document.getElementById('avg-edge').textContent = p.avg_edge + '%';
      document.getElementById('drawdown').textContent = t.drawdown + '%';
      document.getElementById('drawdown').className = 'card-value ' + (t.drawdown > 10 ? 'red' : 'neutral');
      document.getElementById('open-pos').textContent = p.open_positions;

      document.getElementById('daily-pnl').textContent = fmt(t.daily_pnl, '$');
      document.getElementById('daily-pnl').className = 'card-value ' + colorClass(t.daily_pnl);

      // Trades table
      if (trades.length === 0) return;

      let html = '<table><thead><tr><th>Time</th><th>Side</th><th>Signal</th><th>Entry</th><th>Size</th><th>Edge</th><th>P&L</th><th>Result</th></tr></thead><tbody>';
      for (const tr of trades) {
        const time = tr.ts_entry ? new Date(tr.ts_entry).toLocaleTimeString() : '—';
        const sideClass = tr.side === 'YES' ? 'tag-yes' : 'tag-no';
        let resultTag = '<span class="tag tag-open">OPEN</span>';
        if (tr.resolved) {
          resultTag = tr.won ? '<span class="tag tag-win">WIN</span>' : '<span class="tag tag-loss">LOSS</span>';
        }
        const pnlStr = tr.resolved ? fmt(tr.pnl, '$') : '—';
        const pnlColor = tr.pnl > 0 ? 'color:var(--accent)' : tr.pnl < 0 ? 'color:var(--red)' : '';

        html += `<tr>
          <td>${time}</td>
          <td><span class="tag ${sideClass}">${tr.side}</span></td>
          <td><span class="tag tag-signal">${tr.signal_type || '—'}</span></td>
          <td>${Number(tr.entry_price).toFixed(3)}</td>
          <td>$${Number(tr.size).toFixed(2)}</td>
          <td>${(Number(tr.edge_at_entry) * 100).toFixed(1)}%</td>
          <td style="${pnlColor}">${pnlStr}</td>
          <td>${resultTag}</td>
        </tr>`;
      }
      html += '</tbody></table>';
      document.getElementById('trades-table').innerHTML = html;

    } catch (e) {
      document.getElementById('status').textContent = 'Connection error';
    }
  }

  refresh();
  setInterval(refresh, 10000);
</script>
</body>
</html>
