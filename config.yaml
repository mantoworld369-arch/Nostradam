paper_trade: true
bankroll: 100.0
max_bet_pct: 0.05
min_bet: 1.0
max_bet: 15.0
session_duration_minutes: 30

strategy:
  min_edge: 0.03
  spread_threshold: 0.05
  volume_min: 500
  lookback_trades: 12
  mean_reversion_window: 5
  momentum_threshold: 0.08
  enabled_signals:
    - trend_follow
    - contrarian
    - book_imbalance
    - momentum
    - spread_compression
    - volatility_spike
    - odds_divergence
  side_bias: 1.0  # >1 favors YES, <1 favors NO, auto-adjusted by optimizer

risk:
  max_daily_loss_pct: 0.30
  max_drawdown_pct: 0.40
  max_open_positions: 3
  cooldown_after_loss: 2

cycle_interval_seconds: 20
dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 5050
log_level: INFO
db_path: "nostradam.db"
