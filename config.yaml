# ============================================
# NOSTRADAM CONFIG — v0.2 Session-Based
# ============================================

paper_trade: true

# --- Capital ---
bankroll: 100.0
max_bet_pct: 0.05
min_bet: 1.0
max_bet: 20.0

# --- Session ---
session_duration_minutes: 30   # Bot trades for 30 min, then optimizes

# --- Strategy ---
strategy:
  min_edge: 0.03
  spread_threshold: 0.05
  volume_min: 500
  lookback_trades: 12
  mean_reversion_window: 5
  momentum_threshold: 0.08
  enabled_signals:
    - mean_reversion
    - book_imbalance
    - momentum
    - spread_compression
    - stale_odds

# --- Risk ---
risk:
  max_daily_loss_pct: 0.15
  max_drawdown_pct: 0.25
  max_open_positions: 3
  cooldown_after_loss: 2

# --- Timing ---
cycle_interval_seconds: 30
market_duration_minutes: 5

# --- Dashboard ---
dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 5050

# --- Logging ---
log_level: INFO
db_path: "nostradam.db"
